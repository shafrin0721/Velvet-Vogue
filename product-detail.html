<section class="product-detail">
    <div class="container">
        <div class="product-layout">
            <!-- Product Images -->
            <div class="product-images">
                <div class="main-image">
                    <img src="https://i.ibb.co/0hxdzJf/product-item-4.jpg" alt="Product Main Image">
                </div>
                <div class="thumbnail-gallery">
                    <img src="https://i.ibb.co/9wR2kyH/product-item-8.jpg" alt="Product View 1">
                    <img src="https://i.ibb.co/4pgR4mq/product-item-9.jpg" alt="Product View 2">
                    <img src="https://i.ibb.co/Kz1Pkmb/product-item-5.jpg" alt="Product View 3">
                </div>
            </div>

            <!-- Product Info -->
            <div class="product-info">
                <h1>Luxury Evening Dress</h1>
                <div class="price">$299.99</div>
                <div class="rating">
                    <span class="stars">★★★★★</span>
                    <span class="reviews">(12 Reviews)</span>
                </div>
                
                <div class="product-options">
                    <div class="size-selector">
                        <h3>Size</h3>
                        <div class="options">
                            <button>S</button>
                            <button>M</button>
                            <button>L</button>
                            <button>XL</button>
                        </div>
                    </div>
                    
                    <div class="color-selector">
                        <h3>Color</h3>
                        <div class="options">
                            <button style="background: #000;"></button>
                            <button style="background: #6F4E37;"></button>
                            <button style="background: #4A90E2;"></button>
                        </div>
                    </div>
                </div>

                <div class="add-to-cart">
                    <div class="quantity">
                        <button>-</button>
                        <input type="number" value="1" min="1">
                        <button>+</button>
                    </div>
                    <button class="add-to-cart-btn">Add to Cart</button>
                </div>
            </div>
        </div>
    </div>
</section> 

<section class="wishlist-section">
    <div class="container">
        <h2>My Wishlist</h2>
        <div class="wishlist-grid">
            <!-- Wishlist Item -->
            <div class="wishlist-item">
                <div class="item-image">
                    <img src="https://i.ibb.co/YdnRpSr/wishlist-item1.jpg" alt="Wishlist Item">
                    <button class="remove-from-wishlist">&times;</button>
                </div>
                <div class="item-details">
                    <h3>Elegant Dress</h3>
                    <p class="price">$299.99</p>
                    <button class="move-to-cart">Add to Cart</button>
                </div>
            </div>
            <!-- Repeat for other wishlist items -->
        </div>
    </div>
</section>
