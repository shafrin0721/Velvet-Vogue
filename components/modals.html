<!-- Quick View Modal -->
<div class="modal quick-view-modal" id="quickViewModal">
    <div class="modal-content">
        <button class="close-modal">&times;</button>
        <div class="product-quick-view">
            <div class="product-images">
                <img src="https://i.ibb.co/X57hLMT/product-item-3.jpg" alt="Product" class="main-image">
                <div class="thumbnail-strip">
                    <img src="https://i.ibb.co/0hxdzJf/product-item-4.jpg" alt="Thumbnail 1">
                    <img src="https://i.ibb.co/9wR2kyH/product-item-8.jpg" alt="Thumbnail 2">
                    <img src="https://i.ibb.co/4pgR4mq/product-item-9.jpg" alt="Thumbnail 3">
                </div>
            </div>
            <div class="product-info">
                <h2>Elegant Evening Dress</h2>
                <div class="price">$299.99</div>
                <p class="description">Luxurious evening dress perfect for special occasions...</p>
                <div class="product-options">
                    <!-- Size and Color options -->
                </div>
                <button class="add-to-cart-btn">Add to Cart</button>
            </div>
        </div>
    </div>
</div>

<!-- Shopping Cart Overlay -->
<div class="cart-overlay" id="cartOverlay">
    <div class="cart-content">
        <div class="cart-header">
            <h3>Your Cart</h3>
            <button class="close-cart">&times;</button>
        </div>
        <div class="cart-items">
            <!-- Cart Item Template -->
            <div class="cart-item">
                <img src="https://i.ibb.co/Kz1Pkmb/product-item-5.jpg" alt="Product">
                <div class="item-details">
                    <h4>Classic Dress</h4>
                    <p class="price">$199.99</p>
                    <div class="quantity">
                        <button>-</button>
                        <input type="number" value="1" min="1">
                        <button>+</button>
                    </div>
                </div>
                <button class="remove-item">&times;</button>
            </div>
        </div>
        <div class="cart-footer">
            <div class="cart-total">
                <span>Total:</span>
                <span class="total-amount">$199.99</span>
            </div>
            <button class="checkout-btn">Proceed to Checkout</button>
        </div>
    </div>
</div>
