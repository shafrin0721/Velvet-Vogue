<div class="size-recommender">
    <h4>Find Your Perfect Size</h4>
    <form id="sizeRecommenderForm">
        <div class="measurements">
            <div class="measurement-input">
                <label>Height (cm)</label>
                <input type="number" name="height" required>
            </div>
            <div class="measurement-input">
                <label>Weight (kg)</label>
                <input type="number" name="weight" required>
            </div>
            <!-- Add more measurement inputs -->
        </div>
        <button type="submit">Get Size Recommendation</button>
    </form>
    
    <div class="size-result" style="display: none;">
        <h5>Recommended Size: <span class="recommended-size"></span></h5>
    </div>
</div>
