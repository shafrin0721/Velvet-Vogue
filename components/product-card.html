<div class="product-card">
    <div class="product-image">
        <img src="product-image.jpg" alt="Product">
        <div class="product-actions">
            <button class="quick-view"><i class="fas fa-eye"></i></button>
            <button class="add-to-cart"><i class="fas fa-shopping-cart"></i></button>
            <button class="add-to-wishlist"><i class="fas fa-heart"></i></button>
        </div>
        <span class="sale-badge">Sale</span>
    </div>
    <div class="product-info">
        <h4>Product Name</h4>
        <div class="price">
            <span class="current">$199.99</span>
            <span class="original">$249.99</span>
        </div>
        <div class="color-options">
            <span class="color" style="background: #000;"></span>
            <span class="color" style="background: #c07830;"></span>
            <span class="color" style="background: #523314;"></span>
        </div>
    </div>
</div>
